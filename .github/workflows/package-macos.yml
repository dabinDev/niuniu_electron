name: Package NiuNiu Electron macOS

on:
  workflow_dispatch:
    inputs:
      arch:
        description: macOS architecture to package
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
          - universal
      api_base_url:
        description: API base URL embedded in the client
        required: true
        default: https://niuniu.cylonai.cn

jobs:
  package-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      VITE_API_BASE_URL: ${{ inputs.api_base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm run package:mac:${{ inputs.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: niuniu-electron-macos-${{ inputs.arch }}
          path: release/electron_niuniu-*
